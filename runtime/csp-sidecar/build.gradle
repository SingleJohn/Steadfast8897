plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.6'
}

group = 'fyms.runtime'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
}

dependencies {
    implementation 'de.femtopedia.dex2jar:dex-translator:2.4.13'
    implementation 'org.jsoup:jsoup:1.17.2'
    implementation 'org.json:json:20240303'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('jar') {
    manifest {
        attributes 'Main-Class': 'fyms.csp.CSPProbe'
    }
}

tasks.named('shadowJar') {
    archiveBaseName.set('fyms-csp-sidecar')
    archiveClassifier.set('all')
    archiveVersion.set('')
    manifest {
        attributes 'Main-Class': 'fyms.csp.CSPProbe'
    }
    mergeServiceFiles()
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}
