name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: qingde/fyms-rust

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release && strip target/release/fyms-rs

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package release assets
        run: |
          mkdir -p release-pkg
          cp target/release/fyms-rs release-pkg/
          cp -r migrations release-pkg/
          cp -r web/dist release-pkg/web-dist
          cp docker-compose.yml release-pkg/
          cp Dockerfile release-pkg/
          cd release-pkg
          tar czf ../fyms-rs-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FYMS v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            fyms-rs-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
