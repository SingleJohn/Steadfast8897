name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      value: ${{ steps.version.outputs.value }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="nightly-$(date -u +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

  web-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Pack web dist
        run: tar -czf web-dist.tgz -C web dist

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tgz
          if-no-files-found: error
          retention-days: 1

  csp-sidecar:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build CSP sidecar
        run: |
          cd runtime/csp-sidecar
          chmod +x ./gradlew
          ./gradlew --no-daemon clean shadowJar

      - name: Upload CSP sidecar
        uses: actions/upload-artifact@v4
        with:
          name: csp-sidecar
          path: runtime/csp-sidecar/build/libs/fyms-csp-sidecar-all.jar
          if-no-files-found: error
          retention-days: 1

  binaries:
    needs:
      - csp-sidecar
      - web-assets
      - version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ''
            target: linux-amd64
            binary_name: fyms
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            goarm: ''
            target: linux-arm64
            binary_name: fyms
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            goarm: ''
            target: windows-amd64
            binary_name: fyms.exe
            archive_ext: zip
          - goos: darwin
            goarch: amd64
            goarm: ''
            target: darwin-amd64
            binary_name: fyms
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            goarm: ''
            target: darwin-arm64
            binary_name: fyms
            archive_ext: tar.gz
          - goos: linux
            goarch: '386'
            goarm: ''
            target: linux-386
            binary_name: fyms
            archive_ext: tar.gz
          - goos: linux
            goarch: arm
            goarm: '7'
            target: linux-armv7
            binary_name: fyms
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Unpack web assets
        run: |
          mkdir -p web
          tar -xzf web-dist.tgz -C web

      - name: Download CSP sidecar
        uses: actions/download-artifact@v4
        with:
          name: csp-sidecar
          path: csp-sidecar-artifact

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Fetch embedded fonts
        run: bash scripts/fetch-fonts.sh

      - name: Build and package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          if [ -n "${{ matrix.goarm }}" ]; then
            export GOARM=${{ matrix.goarm }}
          fi
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X fyms/internal/config.BuildVersion=${{ needs.version.outputs.value }} -X fyms/internal/config.BuildCommit=${GITHUB_SHA} -X fyms/internal/config.BuildTime=${BUILD_TIME} -X fyms/internal/config.BuildRepo=${GITHUB_REPOSITORY}"
          go build -trimpath -ldflags "${LDFLAGS}" -o "dist/${{ matrix.binary_name }}" .

          ARCHIVE_BASENAME="fyms_${{ needs.version.outputs.value }}_${{ matrix.target }}"
          PACKAGE_DIR="package/${ARCHIVE_BASENAME}"
          mkdir -p "${PACKAGE_DIR}/migrations"
          mkdir -p "${PACKAGE_DIR}/runtime/js-sidecar"
          mkdir -p "${PACKAGE_DIR}/runtime/csp-sidecar"
          cp "dist/${{ matrix.binary_name }}" "${PACKAGE_DIR}/${{ matrix.binary_name }}"
          cp migrations/*.sql "${PACKAGE_DIR}/migrations/"
          cp runtime/js-sidecar/package.json "${PACKAGE_DIR}/runtime/js-sidecar/"
          cp runtime/js-sidecar/sidecar.mjs "${PACKAGE_DIR}/runtime/js-sidecar/"
          cp csp-sidecar-artifact/fyms-csp-sidecar-all.jar "${PACKAGE_DIR}/runtime/csp-sidecar/"
          cp README.md "${PACKAGE_DIR}/README.md"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            cd package
            zip -9 -r "${ARCHIVE_BASENAME}.zip" "${ARCHIVE_BASENAME}"
          else
            tar -C package -czf "package/${ARCHIVE_BASENAME}.tar.gz" "${ARCHIVE_BASENAME}"
          fi

      - name: Upload raw Linux binary for Docker
        if: matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64')
        uses: actions/upload-artifact@v4
        with:
          name: fyms-linux-${{ matrix.goarch }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: fyms_${{ needs.version.outputs.value }}_${{ matrix.target }}
          path: |
            package/*.zip
            package/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  docker:
    needs:
      - binaries
      - version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: fyms-linux-amd64
          path: dist-linux-amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: fyms-linux-arm64
          path: dist-linux-arm64

      - name: Download CSP sidecar
        uses: actions/download-artifact@v4
        with:
          name: csp-sidecar
          path: csp-sidecar-artifact

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub config
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GHCR config
        id: ghcr
        shell: bash
        env:
          PUBLISH_GHCR: ${{ vars.PUBLISH_GHCR }}
          GHCR_IMAGE: ${{ vars.GHCR_IMAGE }}
        run: |
          image="${GHCR_IMAGE:-ghcr.io/novaforgestack/fyms}"
          image="$(echo "${image}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

          if [[ "${PUBLISH_GHCR,,}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker metadata images
        id: images
        shell: bash
        env:
          DOCKERHUB_ENABLED: ${{ steps.dockerhub.outputs.enabled }}
          GHCR_ENABLED: ${{ steps.ghcr.outputs.enabled }}
          GHCR_IMAGE: ${{ steps.ghcr.outputs.image }}
        run: |
          images=()
          if [[ "${DOCKERHUB_ENABLED}" == "true" ]]; then
            images+=("eianz/fyms")
          fi
          if [[ "${GHCR_ENABLED}" == "true" ]]; then
            images+=("${GHCR_IMAGE}")
          fi
          if [ "${#images[@]}" -eq 0 ]; then
            images+=("eianz/fyms")
          fi

          {
            echo "value<<EOF"
            printf '%s\n' "${images[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.value }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.version.outputs.value }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (steps.dockerhub.outputs.enabled == 'true' || steps.ghcr.outputs.enabled == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fyms-release
          cache-to: type=gha,scope=fyms-release,mode=max

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fyms_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.zip *.tar.gz > checksums.txt

      - name: Generate release notes
        shell: bash
        env:
          PUBLISH_GHCR: ${{ vars.PUBLISH_GHCR }}
          GHCR_IMAGE: ${{ vars.GHCR_IMAGE }}
        run: |
          set -euo pipefail
          git fetch --force --tags
          prev_tag="$(git tag --list 'v*' --sort=-v:refname | awk -v cur="${GITHUB_REF_NAME}" '$0 != cur {print; exit}')"
          docker_images=("eianz/fyms:${GITHUB_REF_NAME}" "eianz/fyms:latest")
          if [[ "${PUBLISH_GHCR,,}" == "true" ]]; then
            ghcr_image="${GHCR_IMAGE:-ghcr.io/novaforgestack/fyms}"
            ghcr_image="$(echo "${ghcr_image}" | tr '[:upper:]' '[:lower:]')"
            docker_images+=("${ghcr_image}:${GITHUB_REF_NAME}" "${ghcr_image}:latest")
          fi
          {
            echo "## Release Assets"
            echo
            for image in "${docker_images[@]}"; do
              echo "- Docker image: \`${image}\`"
            done
            echo "- Binary packages and \`checksums.txt\` are attached below"
            echo "- Docker images include the TVBox JS/CSP runtimes. Binary packages include sidecar files; JS runtime needs Node.js 22+, CSP runtime needs Java 21+ on PATH."
            echo
            echo "## Included Platforms"
            echo
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo "- windows/amd64"
            echo "- darwin/amd64"
            echo "- darwin/arm64"
            echo "- linux/386"
            echo "- linux/arm/v7"
            echo
            echo "## Changes"
            echo
            if [ -n "${prev_tag}" ]; then
              echo "Range: ${prev_tag}..${GITHUB_REF_NAME}"
              echo
              git log --pretty=format:'- %s (%h)' "${prev_tag}..${GITHUB_REF_NAME}"
            else
              echo "Range: first release to ${GITHUB_REF_NAME}"
              echo
              git log --pretty=format:'- %s (%h)' "${GITHUB_REF_NAME}"
            fi
          } > RELEASE_NOTES.md

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          name: FYMS ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: release-assets/*

  release-nightly:
    if: github.ref == 'refs/heads/main'
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fyms_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.zip *.tar.gz > checksums.txt

      - name: Generate nightly release notes
        shell: bash
        env:
          PUBLISH_GHCR: ${{ vars.PUBLISH_GHCR }}
          GHCR_IMAGE: ${{ vars.GHCR_IMAGE }}
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          docker_images=("eianz/fyms:nightly")
          if [[ "${PUBLISH_GHCR,,}" == "true" ]]; then
            ghcr_image="${GHCR_IMAGE:-ghcr.io/novaforgestack/fyms}"
            ghcr_image="$(echo "${ghcr_image}" | tr '[:upper:]' '[:lower:]')"
            docker_images+=("${ghcr_image}:nightly")
          fi
          {
            echo "## Nightly Build"
            echo
            echo "滚动构建。每次 \`main\` 推送都会覆盖本 release 的资产。"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build time (UTC): \`${BUILD_TIME}\`"
            for image in "${docker_images[@]}"; do
              echo "- Docker image: \`${image}\`"
            done
            echo "- Docker images include the TVBox JS/CSP runtimes. Binary packages include sidecar files; JS runtime needs Node.js 22+, CSP runtime needs Java 21+ on PATH."
            echo
            echo "## Included Platforms"
            echo
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo "- windows/amd64"
            echo "- darwin/amd64"
            echo "- darwin/arm64"
            echo "- linux/386"
            echo "- linux/arm/v7"
          } > NIGHTLY_NOTES.md

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          name: FYMS Nightly
          tag_name: nightly
          body_path: NIGHTLY_NOTES.md
          files: release-assets/*
          prerelease: true
          make_latest: false
