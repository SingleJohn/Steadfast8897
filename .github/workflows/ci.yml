name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  web-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

  go-build:
    needs: web-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # 与 publish workflow 一致：不写 GitHub Actions cache，避免占 org 免费存储额度
          cache: false

      - name: Fetch embedded fonts
        run: bash scripts/fetch-fonts.sh

      - name: Build backend
        run: |
          export CGO_ENABLED=0
          go build -trimpath .
